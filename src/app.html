<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta
			name="description"
			content="Multivert — a 5-type personality quiz with multi-axis scoring."
		/>
		<meta name="color-scheme" content="light dark" />
		<!-- Browser chrome (address bar tint, etc). Light/dark variants match
		     the --paper token in src/app.css for visual continuity. -->
		<meta name="theme-color" content="#f5f1ea" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#1a1815" media="(prefers-color-scheme: dark)" />
		<title>Multivert — what vert are you?</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" class="antialiased">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
