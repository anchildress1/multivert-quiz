<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>OG source</title>
		<style>
			@import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&family=Geist:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap');

			:root {
				--paper: #f8f7f4;
				--ink: #1a1815;
				--ink-70: rgba(26, 24, 21, 0.7);
				--ink-08: rgba(26, 24, 21, 0.08);
				--introvert: #4ea3d8;
				--extrovert: #e88a3d;
				--ambivert: #4dbfa2;
				--omnivert: #b8a4e0;
				--otrovert: #e88aa9;
				--accent: #e88aa9;
			}
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}
			html,
			body {
				width: 1200px;
				height: 630px;
				background: var(--paper);
				color: var(--ink);
				font-family: 'Geist', system-ui, sans-serif;
				overflow: hidden;
			}
			.frame {
				width: 1200px;
				height: 630px;
				padding: 64px 72px;
				display: flex;
				flex-direction: column;
				justify-content: space-between;
				position: relative;
			}
			.frame::before {
				content: '';
				position: absolute;
				inset: 0;
				background:
					radial-gradient(
						circle at 78% 18%,
						color-mix(in oklab, var(--extrovert) 14%, transparent),
						transparent 42%
					),
					radial-gradient(
						circle at 18% 82%,
						color-mix(in oklab, var(--omnivert) 16%, transparent),
						transparent 50%
					),
					radial-gradient(
						circle at 50% 50%,
						color-mix(in oklab, var(--introvert) 8%, transparent),
						transparent 60%
					);
				filter: blur(60px);
				pointer-events: none;
				z-index: 0;
			}
			.frame > * {
				position: relative;
				z-index: 1;
			}
			.top {
				display: flex;
				align-items: center;
				justify-content: space-between;
			}
			.wordmark {
				font-family: 'Newsreader', serif;
				font-size: 32px;
				font-weight: 500;
				letter-spacing: -0.01em;
			}
			.wordmark .dot {
				color: var(--accent);
			}
			.eyebrow {
				font-family: 'JetBrains Mono', monospace;
				font-size: 12px;
				letter-spacing: 0.22em;
				text-transform: uppercase;
				color: var(--ink-70);
				display: flex;
				align-items: center;
				gap: 12px;
			}
			.eyebrow::before {
				content: '';
				width: 32px;
				height: 1px;
				background: var(--ink-70);
			}
			.body {
				display: flex;
				flex-direction: column;
				gap: 32px;
			}
			.headline {
				font-family: 'Newsreader', serif;
				font-size: 80px;
				line-height: 1.05;
				letter-spacing: -0.025em;
				font-weight: 500;
				color: var(--ink);
				max-width: 1056px;
			}
			.headline em {
				font-style: italic;
				color: var(--accent);
			}
			.dots {
				display: flex;
				align-items: center;
				gap: 28px;
			}
			.dot-row {
				display: flex;
				align-items: center;
				gap: 10px;
				font-family: 'Newsreader', serif;
				font-size: 22px;
				font-style: italic;
			}
			.swatch {
				width: 14px;
				height: 14px;
				border-radius: 50%;
				display: inline-block;
			}
			.swatch.intro {
				background: var(--introvert);
			}
			.swatch.extro {
				background: var(--extrovert);
			}
			.swatch.amb {
				background: var(--ambivert);
			}
			.swatch.omni {
				background: var(--omnivert);
			}
			.swatch.otro {
				background: var(--otrovert);
			}
			.bottom {
				display: flex;
				align-items: flex-end;
				justify-content: space-between;
				font-family: 'JetBrains Mono', monospace;
				font-size: 13px;
				color: var(--ink-70);
				letter-spacing: 0.02em;
			}
			.tagline {
				font-family: 'Newsreader', serif;
				font-style: italic;
				font-size: 18px;
				color: var(--ink);
			}
		</style>
	</head>
	<body>
		<div class="frame">
			<div class="top">
				<span class="wordmark">multivert<span class="dot">.</span></span>
				<span class="eyebrow">A personality quiz, properly five-sided</span>
			</div>
			<div class="body">
				<h1 class="headline">Which of the <em>five verts</em> are you?</h1>
				<div class="dots">
					<span class="dot-row"><span class="swatch intro"></span>Introvert</span>
					<span class="dot-row"><span class="swatch extro"></span>Extrovert</span>
					<span class="dot-row"><span class="swatch amb"></span>Ambivert</span>
					<span class="dot-row"><span class="swatch omni"></span>Omnivert</span>
					<span class="dot-row"><span class="swatch otro"></span>Otrovert</span>
				</div>
			</div>
			<div class="bottom">
				<span>35 questions · ~6 minutes · scroll-paced</span>
				<span class="tagline">answers stay on your device</span>
			</div>
		</div>
	</body>
</html>
