name: Deploy to Cloudflare Pages

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to deploy (e.g. v1.2.3)
        required: true
        type: string
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cf-pages-production
  cancel-in-progress: false

env:
  PNPM_VERSION: '10.33.1'
  NODE_VERSION: '24'
  CLOUDFLARE_PROJECT_NAME: multivert-quiz

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: deploy
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Self-bootstrap so first-time deploys (and forks) do not 404 with
      # `Project not found [code: 8000007]`. Idempotent: if the project
      # already exists wrangler exits non-zero with "already exists",
      # which we treat as success. Any other failure (auth, permission,
      # network) propagates so we do not silently skip real errors.
      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -o pipefail
          if pnpm exec wrangler pages project create "${CLOUDFLARE_PROJECT_NAME}" \
              --production-branch=main 2>&1 | tee /tmp/cf-create.log; then
            echo "Created Cloudflare Pages project ${CLOUDFLARE_PROJECT_NAME}"
          elif grep -qiE "already exists|HTTP 409|8000077" /tmp/cf-create.log; then
            echo "Cloudflare Pages project ${CLOUDFLARE_PROJECT_NAME} already exists — continuing"
          else
            echo "::error::Failed to ensure Cloudflare Pages project exists"
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .svelte-kit/cloudflare --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }} --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "::warning::deployment-url output empty — skipping smoke test"
            exit 0
          fi
          echo "Deployment URL: $DEPLOY_URL"
          curl -sfI --retry 3 --retry-delay 5 "$DEPLOY_URL" >/dev/null
