name: Deploy to Cloudflare Pages

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to deploy (e.g. v1.2.3)
        required: true
        type: string
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cf-pages-production
  cancel-in-progress: false

env:
  PNPM_VERSION: '10.33.1'
  NODE_VERSION: '24'
  CLOUDFLARE_PROJECT_NAME: multivert

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: deploy
      url: ${{ steps.deploy.outputs.deployment-url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e # v6.0.3
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # No `gitHubToken` here on purpose. With one, wrangler-action
      # auto-creates parallel `production` / `preview` GitHub Deployment
      # records on top of the `deploy` environment this job already
      # writes to — yielding two deployment entries per release and a
      # stale `preview` env that lingers from any non-prod branch run.
      # The `deployment-url` step output is set from wrangler's command
      # response, not the GH Deployments API, so the smoke step below
      # still works without it.
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy .svelte-kit/cloudflare --project-name=${{ env.CLOUDFLARE_PROJECT_NAME }} --branch=main

      # An empty `deployment-url` means wrangler-action did not produce its
      # documented output even though it exited zero — that is itself a
      # deploy failure (we have no URL to verify, no environment URL on the
      # GH UI, no place to send the smoke curl). Fail loud, do not silently
      # skip — the whole point of this step is to confirm the deploy landed.
      - name: Smoke test
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "::error::deployment-url output empty — wrangler-action did not surface a URL"
            exit 1
          fi
          echo "Deployment URL: $DEPLOY_URL"
          curl -sfI --retry 3 --retry-delay 5 "$DEPLOY_URL" >/dev/null
