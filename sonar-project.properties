sonar.projectKey=anchildress1_multivert-quiz
sonar.organization=anchildress1
sonar.projectName=Multivert Quiz
sonar.projectVersion=0.0.0

sonar.sources=src
sonar.tests=src,e2e
sonar.test.inclusions=src/**/*.test.ts,e2e/**/*.spec.ts
sonar.exclusions=src/**/*.test.ts,e2e/**,docs/**,static/**

# Coverage is generated by Vitest from src/lib/**/*.ts and src/lib/**/*.svelte.ts.
# Svelte components and route templates are exercised by Playwright E2E
# specs, not Vitest, so they don't appear in lcov.info. Excluding them from
# Sonar's coverage analysis prevents the gate from counting their lines as
# uncovered. Constants files (types.ts, questions.ts) are likewise excluded:
# they hold display labels and the locked question bank.
sonar.coverage.exclusions=src/**/*.svelte,src/routes/**,src/lib/types.ts,src/lib/questions.ts

# The question bank is a flat data file: 30 entries with identical shape.
# Sonar's CPD detector flags the structural repetition (~72% density). The
# repetition is intrinsic to the data, not a refactoring opportunity.
sonar.cpd.exclusions=src/lib/questions.ts

sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json

sonar.sourceEncoding=UTF-8
